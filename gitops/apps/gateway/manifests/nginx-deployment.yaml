apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-nginx
  namespace: tiny-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-nginx
  template:
    metadata:
      labels:
        app: gateway-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 30081
            - containerPort: 30080
            - containerPort: 30030
            - containerPort: 30090
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: gateway-nginx-config
