apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tiny-llm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/victorvwier/devops-demo.git
    targetRevision: main
    path: gitops/apps/tiny-llm/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: tiny-llm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
