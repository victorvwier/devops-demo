apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-beyla
  namespace: observability
data:
  beyla-dashboard.json: |
    {
      "uid": "beyla-tiny-llm",
      "title": "TinyLLM Beyla Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(http_server_request_duration_seconds_count, service_name)",
            "current": { "selected": true, "text": "tiny-llm", "value": "tiny-llm" },
            "options": [],
            "refresh": 1,
            "multi": false,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_name=~\"$service\"}[5m]))",
              "legendFormat": "requests/sec"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "p95 Latency",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{service_name=~\"$service\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Process CPU",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "avg(process_cpu_utilization_ratio{service_name=~\"$service\"})",
              "legendFormat": "cpu"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "avg(process_memory_usage_bytes{service_name=~\"$service\"})",
              "legendFormat": "memory bytes"
            }
          ]
        }
      ]
    }
