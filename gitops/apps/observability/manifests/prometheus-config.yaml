apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: beyla
        honor_labels: true
        static_configs:
          - targets:
              - beyla.observability.svc.cluster.local:8999
