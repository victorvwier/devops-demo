apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tinyllmservices.demo.platform
spec:
  group: demo.platform
  names:
    kind: TinyLLMService
    listKind: TinyLLMServiceList
    plural: tinyllmservices
    singular: tinyllmservice
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  format: int32
                model:
                  type: object
                  properties:
                    repository:
                      type: string
                    file:
                      type: string
                    revision:
                      type: string
                promptPrefix:
                  type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                ingress:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    host:
                      type: string
                observability:
                  type: object
                  properties:
                    beylaEnabled:
                      type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
                  format: int32
                backendMode:
                  type: string
                backendURL:
                  type: string
                frontendURL:
                  type: string
                lastReconcileTime:
                  type: string
