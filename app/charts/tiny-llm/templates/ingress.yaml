apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiny-llm
spec:
  rules:
    - host: tiny-llm.demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tiny-llm
                port:
                  number: 80
