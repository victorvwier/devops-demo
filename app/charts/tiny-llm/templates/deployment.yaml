apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiny-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tiny-llm
  template:
    metadata:
      labels:
        app: tiny-llm
    spec:
      containers:
        - name: tiny-llm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: CATALOG_PATH
              value: /etc/tiny-llm/catalog/services.json
            - name: DEFAULT_SERVICE
              value: {{ .Values.config.defaultService | quote }}
            - name: PROMPT_PREFIX
              value: {{ .Values.config.promptPrefix | quote }}
          volumeMounts:
            - name: catalog
              mountPath: /etc/tiny-llm/catalog
              readOnly: true
      volumes:
        - name: catalog
          configMap:
            name: tiny-llm-config
